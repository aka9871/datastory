kind = "web"
previewPath = "/datastory/"
title = "Datastory"
version = "1.0.0"
id = "artifacts/datastory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/datastory/" ]
localPort = 24723

[services.development]
run = "pnpm --filter @workspace/datastory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/datastory", "run", "build" ]
publicDir = "artifacts/datastory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24723"
BASE_PATH = "/datastory/"
